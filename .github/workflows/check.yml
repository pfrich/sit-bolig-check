name: Check SiT housing

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium if not cached
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Run script
        run: python check_sit.py

      - name: Commit seen units
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_units.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen SiT units"
            git push
          fi

      - name: Upload debug files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sit-debug-files-${{ github.run_id }}
          path: |
            *.png
            *.txt
          retention-days: 7
