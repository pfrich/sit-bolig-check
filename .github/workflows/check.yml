name: Check SiT housing

"on":
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Cache Playwright
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Chromium if not cached
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Run script
        run: python check_sit.py

      - name: Commit seen units
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_units.json
          git diff --cached --quiet || git commit -m "Update seen SiT units"
          git push
