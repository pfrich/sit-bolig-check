name: Check SiT housing

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "new = bare nye, summary = daglig oppsummering"
        required: true
        default: "new"
        type: choice
        options:
          - new
          - summary
      from_date:
        description: "Fra-dato, f.eks. 2026-06-10. Tom = standard i scriptet."
        required: false
        default: ""
        type: string
      to_date:
        description: "Til-dato, f.eks. 2026-08-15. Tom = standard i scriptet."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: sit-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Run script
        run: |
          python check_sit.py \
            --mode "${{ inputs.mode }}" \
            --from-date "${{ inputs.from_date }}" \
            --to-date "${{ inputs.to_date }}"

      - name: Commit seen units
        if: ${{ inputs.mode == 'new' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add seen_units.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen SiT units"
            git push
          fi

      - name: Upload debug files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sit-debug-files-${{ github.run_id }}
          path: |
            *.png
            *.txt
          retention-days: 7
